name: ollvm19-aarch64-build

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  build:
    timeout-minutes: 150
    runs-on: windows-latest
    env:
      BUILD_TYPE: Release
    steps:
    - name: Get CPU core count
      id: cpu
      shell: powershell
      run: |
        $cores = (Get-CimInstance -ClassName Win32_Processor).NumberOfLogicalProcessors
        echo "cores=$cores" >> $env:GITHUB_OUTPUT
        echo "CORES=$cores" >> $env:GITHUB_ENV

    - name: Checkout Repo
      uses: actions/checkout@v4
      with:
        repository: JiaPai12138/llvm-19
        path: llvm-19
        submodules: recursive
        clean: true
        fetch-depth: 1

    - name: Install sccache
      run: choco install sccache -y

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build LLVM with AArch64+ARM+X86
      shell: cmd
      run: |
        call "%ProgramFiles%\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
        cmake -Bbuild -G Ninja ^
        -DLLVM_ENABLE_RPMALLOC=OFF ^
        -DLLVM_TOOL_LLVM_SHLIB_BUILD=OFF ^
        -DLLVM_INCLUDE_TESTS=OFF ^
        -DLLVM_INCLUDE_TOOLS=ON ^
        -DLLVM_INCLUDE_EXAMPLES=OFF ^
        -DLLDB_ENABLE_PYTHON=OFF ^
        -DLLVM_ENABLE_LIBXML2=OFF ^
        -DLLVM_ENABLE_ZLIB=OFF ^
        -DCMAKE_BUILD_TYPE=%BUILD_TYPE% ^
        -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded ^
        -DLLVM_OBFUSCATION_LINK_INTO_TOOLS=ON ^
        -DCMAKE_INSTALL_PREFIX=install ^
        -DLLVM_TARGETS_TO_BUILD="AArch64" ^
        -DLLVM_ENABLE_PROJECTS="clang;lld" ^
        -DCMAKE_C_COMPILER=clang-cl ^
        -DCMAKE_CXX_COMPILER=clang-cl ^
        -DCMAKE_C_COMPILER_LAUNCHER=sccache ^
        -DCMAKE_CXX_COMPILER_LAUNCHER=sccache ^
        llvm-19\\llvm
        cmake --build build --config %BUILD_TYPE% --target install --verbose -j %CORES%

    - name: Package
      run: |
        7z a -t7z -mmt -mf -mhc -mhcf -m0=LZMA2 -mx=3 windows-llvm-aarch64.7z `
          install/bin/clang.exe `
          install/bin/clang-cl.exe `
          install/bin/clang-cpp.exe `
          install/bin/clang-format.exe `
          install/bin/clang++.exe `
          install/bin/lld.exe `
          install/bin/lld-link.exe `
          install/bin/llvm-ar.exe `
          install/bin/llvm-lib.exe `
          install/bin/llvm-nm.exe `
          install/bin/llvm-objdump.exe `
          install/bin/llvm-readobj.exe `
          install/bin/llvm-strip.exe

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ollvm19-aarch64
        path: windows-llvm-aarch64.7z
